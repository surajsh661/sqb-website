<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" fill="none" stroke="#d8d2c4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Faint engine-bay / cylinder-head blueprint. The two large ringed
       housings sit behind the founder portraits so the circles read as
       mounted engine components. Strokes are intentionally low-opacity. -->
  <g opacity="0.55">

    <!-- central manifold block connecting the two heads -->
    <rect x="430" y="250" width="320" height="140" rx="14" opacity="0.5"/>
    <line x1="430" y1="284" x2="750" y2="284" opacity="0.35"/>
    <line x1="430" y1="320" x2="750" y2="320" opacity="0.35"/>
    <line x1="430" y1="356" x2="750" y2="356" opacity="0.35"/>
    <!-- intake runners off the manifold -->
    <path d="M470 250 q-10 -34 -44 -44" opacity="0.4"/>
    <path d="M540 250 q-6 -30 -40 -50" opacity="0.4"/>
    <path d="M640 250 q6 -30 40 -50" opacity="0.4"/>
    <path d="M710 250 q10 -34 44 -44" opacity="0.4"/>

    <!-- LEFT cylinder-head housing (behind Suraj) -->
    <g transform="translate(431 320)">
      <circle r="176" opacity="0.5"/>
      <circle r="150" opacity="0.7"/>
      <circle r="120" opacity="0.3"/>
      <!-- bolt ring -->
      <g opacity="0.6">
        <circle cx="0" cy="-163" r="5"/><circle cx="82" cy="-141" r="5"/>
        <circle cx="141" cy="-82" r="5"/><circle cx="163" cy="0" r="5"/>
        <circle cx="141" cy="82" r="5"/><circle cx="82" cy="141" r="5"/>
        <circle cx="0" cy="163" r="5"/><circle cx="-82" cy="141" r="5"/>
        <circle cx="-141" cy="82" r="5"/><circle cx="-163" cy="0" r="5"/>
        <circle cx="-141" cy="-82" r="5"/><circle cx="-82" cy="-141" r="5"/>
      </g>
    </g>

    <!-- RIGHT cylinder-head housing (behind Shubham) -->
    <g transform="translate(749 320)">
      <circle r="176" opacity="0.5"/>
      <circle r="150" opacity="0.7"/>
      <circle r="120" opacity="0.3"/>
      <g opacity="0.6">
        <circle cx="0" cy="-163" r="5"/><circle cx="82" cy="-141" r="5"/>
        <circle cx="141" cy="-82" r="5"/><circle cx="163" cy="0" r="5"/>
        <circle cx="141" cy="82" r="5"/><circle cx="82" cy="141" r="5"/>
        <circle cx="0" cy="163" r="5"/><circle cx="-82" cy="141" r="5"/>
        <circle cx="-141" cy="82" r="5"/><circle cx="-163" cy="0" r="5"/>
        <circle cx="-141" cy="-82" r="5"/><circle cx="-82" cy="-141" r="5"/>
      </g>
    </g>

    <!-- hoses sweeping off to the sides -->
    <path d="M255 320 C 150 300, 120 220, 60 210" opacity="0.4"/>
    <path d="M255 360 C 150 380, 130 470, 70 500" opacity="0.4"/>
    <path d="M925 320 C 1030 300, 1060 220, 1120 210" opacity="0.4"/>
    <path d="M925 360 C 1030 380, 1050 470, 1110 500" opacity="0.4"/>

    <!-- ribbed valve covers top & bottom -->
    <g opacity="0.35">
      <rect x="300" y="120" width="580" height="40" rx="8"/>
      <line x1="340" y1="120" x2="340" y2="160"/><line x1="400" y1="120" x2="400" y2="160"/>
      <line x1="460" y1="120" x2="460" y2="160"/><line x1="520" y1="120" x2="520" y2="160"/>
      <line x1="580" y1="120" x2="580" y2="160"/><line x1="640" y1="120" x2="640" y2="160"/>
      <line x1="700" y1="120" x2="700" y2="160"/><line x1="760" y1="120" x2="760" y2="160"/>
      <line x1="820" y1="120" x2="820" y2="160"/>
      <rect x="300" y="480" width="580" height="40" rx="8"/>
      <line x1="340" y1="480" x2="340" y2="520"/><line x1="400" y1="480" x2="400" y2="520"/>
      <line x1="460" y1="480" x2="460" y2="520"/><line x1="520" y1="480" x2="520" y2="520"/>
      <line x1="580" y1="480" x2="580" y2="520"/><line x1="640" y1="480" x2="640" y2="520"/>
      <line x1="700" y1="480" x2="700" y2="520"/><line x1="760" y1="480" x2="760" y2="520"/>
      <line x1="820" y1="480" x2="820" y2="520"/>
    </g>

    <!-- small gauges / fluid caps -->
    <g opacity="0.45">
      <circle cx="180" cy="150" r="26"/><circle cx="180" cy="150" r="14"/>
      <circle cx="1000" cy="150" r="26"/><circle cx="1000" cy="150" r="14"/>
      <circle cx="150" cy="470" r="20"/><circle cx="1030" cy="470" r="20"/>
    </g>
  </g>
</svg>
